general {
    ignore_empty_input = true
}

# Transparent wallpaper OVER time animation
background {
    monitor =
    path = $HOME/.dotfiles/files/wallpapers/Waves-Transparent.png
    zindex = 0
}

# Full-screen time animation - HDMI-A-1 (2560x1440)
image {
    monitor = HDMI-A-1
    path = /tmp/hyprlock_time_frames/2560x1440/placeholder.png
    size = 1440
    rounding = 0
    border_size = 0
    reload_time = 1
    reload_cmd = $HOME/.dotfiles/config/.config/hypr/media-status.sh --time 2560 1440
    position = 0, 0
    halign = center
    valign = center
    zindex = -2
}

# Full-screen time animation - eDP-1 (1920x1080)
image {
    monitor = eDP-1
    path = /tmp/hyprlock_time_frames/1920x1080/placeholder.png
    size = 1080
    rounding = 0
    border_size = 0
    reload_time = 1
    reload_cmd = $HOME/.dotfiles/config/.config/hypr/media-status.sh --time 1920 1080
    position = 0, 0
    halign = center
    valign = center
    zindex = -2
}

input-field {
    monitor =
    size = 500, 50
    position = 0, 0
    halign = center
    valign = center

    dots_size = 0.3
    dots_spacing = 0.4
    dots_rounding = -1 # -1 default circle, -2 follow input-field rounding

    outline_thickness = 0
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0)

    font_color = rgb(255, 255, 255)
    placeholder_text =
    hide_input = false
    check_color = $primary
    fail_color = $primary

    fail_text = Attempt $ATTEMPTS — $FAIL — $LAYOUT keyboard layout
    fail_timeout = 5000

    capslock_color = rgba(255, 0, 0, 200)
    numlock_color = rgba(0, 0, 255, 200)
    bothlock_color = rgba(255, 0, 255, 200)
    invert_numlock = false
    swap_font_color = false

    zindex = 3

    # shadow_size = 5
    # shadow_passes = 1
}

label {
    monitor =
    text = cmd[update:1000] echo "$TIME"
    color = rgb(240, 248, 255)
    position = 0, 240
    font_family = Inter Bold
    font_size = 80
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = cmd[update:1000] date +'%A, %d. %B'
    color = rgb(220, 230, 255)
    position = 0, 150
    font_family = Inter Bold
    font_size = 30
    halign = center
    valign = center
    zindex = 2
}

image {
    monitor =
    path = /tmp/transparent_placeholder.png
    size = 150
    rounding = 15

    border_size = 0
    border_color = rgb(255, 255, 255)

    reload_time = 1
    reload_cmd = $HOME/.dotfiles/config/.config/hypr/media-status.sh --art
    position = 0, 110
    halign = center
    valign = bottom
    zindex = 2
}

label {
    monitor =
    text = cmd[update:1000] $HOME/.dotfiles/config/.config/hypr/media-status.sh --title
    color = rgba(200, 220, 255, 0.6)
    font_family = Inter Display Bold
    font_size = 18
    position = 0, 60
    halign = center
    valign = bottom
    zindex = 2
}

label {
    monitor =
    text = cmd[update:1000] $HOME/.dotfiles/config/.config/hypr/media-status.sh --artist
    color = rgba(200, 220, 255, 0.5)
    font_family = Inter Display Italic
    font_size = 18
    position = 0, 25
    halign = center
    valign = bottom
    zindex = 2
}
